<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RGB QR Scanner</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: sans-serif;
    text-align: center;
  }

  canvas {
    margin-top: 40px;
    max-width: 90vw;
    border-radius: 12px;
  }

  .buttons {
    margin-top: 15px;
  }

  button {
    font-size: 20px;
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .r { background: red; }
  .g { background: green; }
  .b { background: blue; }
  .c { background: gray; }

  .outputs {
    margin-top: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="buttons">
  <button class="c" onclick="mode='color'">RGB</button>
  <button class="r" onclick="mode='r'">R</button>
  <button class="g" onclick="mode='g'">G</button>
  <button class="b" onclick="mode='b'">B</button>
</div>

<div class="outputs">
  <div id="outR">R: ...</div>
  <div id="outG">G: ...</div>
  <div id="outB">B: ...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
let mode = "color";

const video = document.createElement("video");
video.setAttribute("playsinline", true);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
  video.play();
  requestAnimationFrame(loop);
});

function loop() {
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const w = video.videoWidth;
    const h = video.videoHeight;

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(video, 0, 0, w, h);

    const frame = ctx.getImageData(0, 0, w, h);
    const data = frame.data;

    const r = new Uint8ClampedArray(data);
    const g = new Uint8ClampedArray(data);
    const b = new Uint8ClampedArray(data);

    for (let i = 0; i < data.length; i += 4) {
      const rv = data[i];
      const gv = data[i+1];
      const bv = data[i+2];

      // grayscale per channel
      r[i]=r[i+1]=r[i+2]=rv;
      g[i]=g[i+1]=g[i+2]=gv;
      b[i]=b[i+1]=b[i+2]=bv;
    }

    // отображение
    if (mode === "r") ctx.putImageData(new ImageData(r, w, h), 0, 0);
    else if (mode === "g") ctx.putImageData(new ImageData(g, w, h), 0, 0);
    else if (mode === "b") ctx.putImageData(new ImageData(b, w, h), 0, 0);
    else ctx.putImageData(frame, 0, 0);

    // декод
    decodeChannel(r, w, h, "outR");
    decodeChannel(g, w, h, "outG");
    decodeChannel(b, w, h, "outB");
  }

  setTimeout(() => requestAnimationFrame(loop), 200);
}

function decodeChannel(arr, w, h, outId) {
  const bin = new Uint8ClampedArray(arr);

  for (let i = 0; i < bin.length; i += 4) {
    const v = bin[i] > 128 ? 255 : 0;
    bin[i]=bin[i+1]=bin[i+2]=v;
  }

  const img = new ImageData(bin, w, h);
  const qr = jsQR(img.data, w, h);

  document.getElementById(outId).innerText =
    qr ? (outId[3] + ": " + qr.data) : (outId[3] + ": ...");
}
</script>

</body>
</html>
